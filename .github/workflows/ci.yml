name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Python syntax
        run: python -m py_compile index.py app/main.py app/blockchain.py app/schemas.py

      - name: Verify shell scripts
        run: |
          bash -n start_nodes.sh
          bash -n stop_nodes.sh

      - name: Verify Vercel frontend files exist
        run: |
          test -f frontend/index.html
          test -f frontend/app.js
          test -f frontend/styles.css
          test -f frontend/config.js
