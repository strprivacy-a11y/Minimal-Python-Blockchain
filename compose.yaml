services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      BLOCKCHAIN_STATE_KEY: ${BLOCKCHAIN_STATE_KEY:-minimal-python-blockchain:state}
      REDIS_URL: ${REDIS_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
    depends_on:
      redis:
        condition: service_started
        required: false
      postgres:
        condition: service_healthy
        required: false

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: blockchain
      POSTGRES_USER: blockchain
      POSTGRES_PASSWORD: blockchain
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockchain -d blockchain"]
      interval: 5s
      timeout: 5s
      retries: 10

